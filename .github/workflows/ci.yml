name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: lint, typecheck, test, build (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Smoke (version command)
        shell: bash
        run: node bin/ously.mjs version

  size:
    name: install size budget
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check unpacked size
        run: |
          SIZE=$(du -sb dist | awk '{print $1}')
          echo "dist size: $SIZE bytes"
          if [ "$SIZE" -gt 102400 ]; then
            echo "::error::dist exceeds 100KB budget ($SIZE > 102400 bytes)"
            exit 1
          fi
      - name: Check tarball size
        run: |
          pnpm pack --pack-destination /tmp/pack 2>/dev/null
          SIZE=$(stat -c%s /tmp/pack/*.tgz)
          echo "tarball size: $SIZE bytes"
          if [ "$SIZE" -gt 204800 ]; then
            echo "::error::tarball exceeds 200KB budget ($SIZE > 204800 bytes)"
            exit 1
          fi
